substitutions:
  name: svp-warmteset
  friendly_name: "Stadsverwarming Warmteset"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: "Jarvis.Stadsverwarming Warmteset"
    version: "ESP32-S3-N16R8"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# External component — point to your local components folder or a GitHub repo
external_components:
  - source:
      type: local
      path: components

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name} Fallback"
    password: !secret fallback_password

# USB UART — Hichi HB0015 with CP2102 chip connected via USB-OTG
usb_host:
  - id: usb_host_bus

usb_uart:
  - type: cp210x
    usb_host_id: usb_host_bus
    channels:
      - id: uart_kamstrup
        baud_rate: 1200
        stop_bits: 2
        buffer_size: 4096

# Kamstrup Multical402 sensors via custom component
sensor:
  - platform: multical402
    uart_id: uart_kamstrup
    update_interval: 30s
    heat_energy:
      name: "IR Warmte Energie"
      force_update: true
    supply_temperature:
      name: "IR Aanvoer Temperatuur"
      force_update: true
    return_temperature:
      name: "IR Retour Temperatuur"
      force_update: true
    temperature_difference:
      name: "IR Temperatuur Verschil"
      force_update: true
    power:
      name: "IR Vermogen"
      force_update: true
    flow_rate:
      name: "IR Doorstroming"
      force_update: true
    volume:
      name: "IR Volume"
      force_update: true

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: sensor_uptime
    id: sensor_uptime

psram:
